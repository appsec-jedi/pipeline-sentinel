name: Test Pipeline Sentinel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sentinel-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: Install dependencies
        run: |
          go mod tidy

      - name: Run Pipeline Sentinel
        run: |
          echo "🔍 Running simulated CI job..."
          go run cmd/root.go